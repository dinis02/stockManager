<form class="inventory-form" (ngSubmit)="save()">
  <div class="form-row">
    <label>Nome do Produto *
      <input name="name" [(ngModel)]="item.name" required placeholder="Nome do produto" />
    </label>
    <label>Marca
      <select name="brand" [(ngModel)]="item.brand">
        <option value="">Sem marca</option>
        <option *ngFor="let brand of brands" [value]="brand.name">{{ brand.name }}</option>
      </select>
    </label>
  </div>

  <div class="form-row">
    <label>Categoria
      <select name="category" [(ngModel)]="item.category">
        <option *ngFor="let category of categories" [value]="category.name">{{ category.name }}</option>
      </select>
    </label>
    <label>Quantidade *
      <input name="quantity" type="number" min="0" [(ngModel)]="item.quantity" required />
    </label>
    <label>Quantidade minima
      <input name="min_quantity" type="number" min="0" [(ngModel)]="item.min_quantity" placeholder="0" />
    </label>
    <label>Unidade
      <select name="unit" [(ngModel)]="item.unit">
        <option>un</option>
        <option>ml</option>
      </select>
    </label>
  </div>

  <div class="form-row">
    <label>Data de compra *
      <input name="date" type="date" [(ngModel)]="item.date" required />
    </label>
    <label>Fornecedor
      <input name="supplier" [(ngModel)]="item.supplier" />
    </label>
    <label>Preco unitario (EUR)
      <input name="price" type="number" step="0.01" [(ngModel)]="item.price" />
    </label>
  </div>

  <label>Observacoes
    <textarea name="notes" rows="2" [(ngModel)]="item.notes"></textarea>
  </label>

  <div class="form-actions">
    <button class="btn btn-primary" type="submit" [disabled]="saving">
      <span>{{ item.id ? 'Guardar produto' : 'Adicionar produto' }}</span>
    </button>
  </div>
</form>
