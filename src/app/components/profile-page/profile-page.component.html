<form class="profile-form" (ngSubmit)="updatePassword()">
  <div class="form-row">
    <label>Email *
      <input name="email" [(ngModel)]="editEmail" required placeholder="seu@email.com" />
    </label>
  </div>

  <div class="form-row">
    <label>Palavra-passe atual *
      <input name="currentPassword" type="password" [(ngModel)]="currentPassword" required placeholder="********" />
    </label>
    <label>Nova palavra-passe *
      <input name="newPassword" type="password" [(ngModel)]="newPassword" required placeholder="********" />
    </label>
  </div>

  <div class="form-row">
    <label>Confirmar palavra-passe *
      <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" required placeholder="********" />
    </label>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="loading" class="btn btn-primary">
      {{ loading ? 'A atualizar...' : 'Guardar perfil' }}
    </button>
  </div>
</form>
