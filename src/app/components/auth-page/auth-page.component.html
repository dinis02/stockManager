<div class="auth-container">
  <div class="auth-card">
    <div class="auth-content">
      <!-- Register Section -->
      <div class="auth-section">
        <div class="auth-header">
          <h2>Criar Conta</h2>
        </div>

        <form class="auth-form" (ngSubmit)="register()">
          <div class="form-group">
            <label>Nome Completo *</label>
            <input 
              type="text" 
              [(ngModel)]="registerName" 
              name="registerName"
              placeholder="Seu nome"
              required
            />
          </div>

          <div class="form-group">
            <label>Email *</label>
            <input 
              type="email" 
              [(ngModel)]="registerEmail" 
              name="registerEmail"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Palavra-passe *</label>
            <input 
              type="password" 
              [(ngModel)]="registerPassword" 
              name="registerPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="form-group">
            <label>Confirmar Palavra-passe *</label>
            <input 
              type="password" 
              [(ngModel)]="registerPassword2" 
              name="registerPassword2"
              placeholder="••••••••"
              required
            />
          </div>

          <button 
            class="btn btn--primary btn--block" 
            type="submit"
            [disabled]="loading"
          >
            {{ loading ? 'A processar...' : 'Criar Conta' }}
          </button>
        </form>
      </div>

      <!-- Divider -->
      <div class="auth-divider"></div>

      <!-- Login Section -->
      <div class="auth-section">
        <div class="auth-header">
          <h2>Fazer Login</h2>
        </div>

        <form class="auth-form" (ngSubmit)="login()">
          <div class="form-group">
            <label>Email *</label>
            <input 
              type="email" 
              [(ngModel)]="loginEmail" 
              name="loginEmail"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Palavra-passe *</label>
            <input 
              type="password" 
              [(ngModel)]="loginPassword" 
              name="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <button 
            class="btn btn--primary btn--block" 
            type="submit"
            [disabled]="loading"
          >
            {{ loading ? 'A processar...' : 'Entrar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
